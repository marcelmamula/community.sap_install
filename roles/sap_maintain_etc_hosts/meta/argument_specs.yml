---
# Requires: ansible 2.11
# Argument specifications in this separate file maintain backwards compatibility.
argument_specs:

# For required variables using aliases do not work and fail the argument validation.

  main:
    short_description: Configure /etc/hosts
    description: This is role is used for proper local /etc/hosts configuration.
    options:
      sap_maintain_etc_hosts_list:
        type: list
        description:
          - List of nodes to be added or removed in /etc/hosts
        elements: dict
        options:
          node_ip:
            type: str
            description:
              - IP address of the host to manage, depending on 'state'.
              - Required for 'state present'.
              - Optional for 'state absent', where 'node_name' and 'node_domain' can be used instead.
          node_name:
            type: str
            description:
              - Hostname of the host to manage.
              - Required for 'state present'.
              - Optional for 'state absent', where 'node_ip' can be used instead.
          node_domain:
            type: str
            description:
              - Domain name of the host to manage.
              - Defaults to 'sap_maintain_etc_hosts_domain' or 'ansible_facts["domain"]'.
              - Required for 'state present'.
              - Optional for 'state absent' with 'node_name', where 'node_ip' can be used instead.
          aliases:
            type: list
            elements: str
            description:
              - List of aliases of the host to manage.
              - Optional for 'state present'.
              - Not used in 'state absent'.
          alias_mode:
            type: str
            default: merge
            choices:
              - merge
              - overwrite
            description:
              - Select method of managing aliases of the host.
              - merge - merges the list of aliases with the exiting aliases of the host.
              - overwrite - overwrites the aliases of the host.
              - Optional for 'state present'.
              - Not used in 'state absent'.
          node_comment:
            type: str
            default: "{{ sap_maintain_etc_hosts_comment }}"
            description:
              - String which is appended at end of line of the host to manage.
              - Replaces existing comment, if present.
              - Optional for 'state present'.
              - Not used in 'state absent'.
          hana_site:
            type: str
            description:
              - Used by 'sap_ha_pacemaker_cluster' role and it is appended to 'node_comment'.
              - Optional for 'state present'.
              - Not used in 'state absent'.
          node_role:
            description:
              - Not used, but mentioned for compatibility reasons with 'sap_ha_pacemaker_cluster' role.
          state:
            type: str
            default: present
            choices:
              - present
              - absent
            description:
              - Select desired state of host item.
              - present - Add new hosts entry.
              - absent - Remove existing hosts entry.
              - Optional for 'state present'.
              - Required for 'state absent', because it defaults to 'present'.
        example:
          sap_maintain_etc_hosts_list:
            - node_ip: 10.10.10.10
              node_name: host1
              node_domain: abc.de
              aliases:
                - alias1
                - anotheralias2
              node_comment: "This is a comment"
              state: present
            - node_ip: 10.10.10.11
              state: absent
            - node_name: host2
              state: absent

      sap_maintain_etc_hosts_delimiter:
        type: str
        default: " "
        description:
          - Delimiter for '/etc/hosts' used to separate all elements on a line
          - Changing delimiter will report as change, even if actual content did not change.
        choices:
          - " "
          - "\t"

      sap_maintain_etc_hosts_comment:
        type: str
        default: "managed by Ansible role sap_maintain_etc_hosts"
        description:
          - Comment to be appended, if comment is not defined in 'sap_maintain_etc_hosts_list'.
          - Replaces existing comment, if present.
